<div class="card">
    <h3 class="card-title">Top Scorers</h3>
    {% if scorers and scorers[code] %}
    <div class="table-wrap">
        <table class="table-compact">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Goals</th>
                    <th class="hide-mobile-sm">Assists</th>
                </tr>
            </thead>
            <tbody>
                {% for player in scorers[code] %}
                <tr>
                    <td class="td-center rank-cell">{{ loop.index }}</td>
                    <td class="td-left">
                        <div class="player-info">
                            <span class="player-name">{{ player.player.name }}</span>
                            <span class="player-team">{{ player.team.name }}</span>
                        </div>
                    </td>
                    <td class="td-center font-bold goals-cell">{{ player.goals }}</td>
                    <td class="td-center hide-mobile-sm">{{ player.assists or 0 }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <p class="no-data">Top scorers data unavailable.</p>
    {% endif %}
</div>
